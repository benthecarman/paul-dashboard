<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>futurepaul - GitHub Dashboard</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-2: #1c2333;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --orange: #d29922;
            --red: #f85149;
            --purple: #bc8cff;
            --pink: #f778ba;
            --cyan: #39d2c0;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            line-height: 1.5;
            padding: 2rem;
        }

        .dashboard { max-width: 1400px; margin: 0 auto; }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .loading .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            padding: 2rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 2rem;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            flex-shrink: 0;
        }

        .profile-info h1 { font-size: 2rem; font-weight: 700; }
        .profile-info h1 span { color: var(--text-muted); font-weight: 400; font-size: 1.2rem; }

        .profile-meta {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .profile-meta a { color: var(--accent); text-decoration: none; }
        .profile-meta a:hover { text-decoration: underline; }

        .badge {
            display: inline-block;
            background: var(--surface-2);
            border: 1px solid var(--border);
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .badge.hireable { border-color: var(--green); color: var(--green); }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            text-align: center;
        }

        .stat-card .number { font-size: 2.2rem; font-weight: 700; line-height: 1; }
        .stat-card .label { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.25rem; }
        .stat-card.accent .number { color: var(--accent); }
        .stat-card.green .number { color: var(--green); }
        .stat-card.orange .number { color: var(--orange); }
        .stat-card.purple .number { color: var(--purple); }
        .stat-card.pink .number { color: var(--pink); }
        .stat-card.cyan .number { color: var(--cyan); }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 1000px) {
            .grid-2 { grid-template-columns: 1fr; }
            .profile-header { flex-direction: column; text-align: center; }
            .profile-meta { justify-content: center; }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .lang-bar {
            display: flex;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .lang-legend { display: flex; flex-wrap: wrap; gap: 0.75rem; }

        .lang-legend-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.85rem;
        }

        .lang-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .lang-count { color: var(--text-muted); }

        .repo-item { padding: 0.85rem 0; border-bottom: 1px solid var(--border); }
        .repo-item:last-child { border-bottom: none; }

        .repo-item .repo-name {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .repo-item .repo-name:hover { text-decoration: underline; }

        .repo-desc { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.15rem; }

        .repo-meta {
            display: flex;
            gap: 1rem;
            margin-top: 0.35rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .repo-meta .star { color: var(--orange); }

        .repo-lang {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 3px;
            vertical-align: middle;
        }

        .timeline-item {
            display: flex;
            gap: 0.75rem;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .timeline-item:last-child { border-bottom: none; }

        .timeline-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            flex-shrink: 0;
            font-weight: 700;
        }

        .timeline-icon.push { background: #1f3d2e; color: var(--green); }
        .timeline-icon.pr { background: #2a1f3d; color: var(--purple); }
        .timeline-icon.create { background: #1f2d3d; color: var(--accent); }
        .timeline-icon.delete { background: #3d1f1f; color: var(--red); }
        .timeline-icon.issue { background: #3d351f; color: var(--orange); }
        .timeline-icon.review { background: #3d1f35; color: var(--pink); }
        .timeline-icon.other { background: #2d2d2d; color: var(--text-muted); }

        .timeline-content { flex: 1; }
        .timeline-repo { color: var(--accent); font-weight: 600; }
        .timeline-time { color: var(--text-muted); font-size: 0.75rem; }

        .activity-grid { display: flex; flex-direction: column; gap: 0.5rem; }

        .activity-repo { display: flex; align-items: center; gap: 0.75rem; }

        .activity-repo-name {
            width: 160px;
            font-size: 0.85rem;
            text-align: right;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--accent);
            flex-shrink: 0;
        }

        .activity-bar-container {
            flex: 1;
            background: var(--surface-2);
            border-radius: 4px;
            height: 24px;
            overflow: hidden;
        }

        .activity-bar {
            height: 100%;
            border-radius: 4px;
            display: flex;
            align-items: center;
            padding-left: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            min-width: 30px;
        }

        .starred-item { padding: 0.65rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .starred-item:last-child { border-bottom: none; }
        .starred-name { color: var(--accent); text-decoration: none; font-weight: 600; }
        .starred-name:hover { text-decoration: underline; }

        .starred-desc {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 0.1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .gist-item { padding: 0.65rem 0; border-bottom: 1px solid var(--border); }
        .gist-item:last-child { border-bottom: none; }
        .gist-name { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        .gist-name:hover { text-decoration: underline; }
        .gist-files { color: var(--text-muted); font-size: 0.8rem; }

        .focus-tag {
            display: inline-block;
            padding: 0.35rem 0.8rem;
            margin: 0.25rem;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid var(--border);
            background: var(--surface-2);
        }

        .focus-tag.hot { border-color: var(--orange); color: var(--orange); }
        .focus-tag.warm { border-color: var(--accent); color: var(--accent); }

        .account-age { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem; }

        .year-chart {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 80px;
            margin-top: 0.5rem;
        }

        .year-bar {
            flex: 1;
            border-radius: 3px 3px 0 0;
            min-width: 4px;
            position: relative;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .year-bar:hover { opacity: 1; }

        .year-bar:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 105%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            white-space: nowrap;
            z-index: 10;
        }

        .year-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
            margin-right: 0.5rem;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .scroll-inner { max-height: 500px; overflow-y: auto; }
        .scroll-inner::-webkit-scrollbar { width: 6px; }
        .scroll-inner::-webkit-scrollbar-track { background: var(--surface); }
        .scroll-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .full-width { margin-bottom: 1.5rem; }

        .updated {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { padding: 0.5rem; text-align: left; border-bottom: 2px solid var(--border); }
        td { padding: 0.5rem; border-bottom: 1px solid var(--border); }

        .error-msg {
            background: #3d1f1f;
            border: 1px solid var(--red);
            color: var(--red);
            padding: 1rem;
            border-radius: var(--radius);
            text-align: center;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="dashboard" id="app">
        <div class="loading">
            <div class="spinner"></div>
            <div>Loading dashboard for @futurepaul...</div>
        </div>
    </div>

    <script>
        const USERNAME = 'futurepaul';
        const API = 'https://api.github.com';

        const LANG_COLORS = {
            Rust: '#dea584', TypeScript: '#3178c6', JavaScript: '#f1e05a',
            HTML: '#e34c26', Zig: '#ec915c', Shell: '#89e051', Dart: '#00B4AB',
            Go: '#00ADD8', Swift: '#F05138', Python: '#3572A5', C: '#555555',
            'C++': '#f34b7d', Java: '#b07219', Ruby: '#701516', Kotlin: '#A97BFF',
            Svelte: '#ff3e00', Vue: '#41b883', CSS: '#563d7c', Nix: '#7e7eff',
            Haskell: '#5e5086', Lua: '#000080', SCSS: '#c6538c',
        };

        const BAR_GRADIENTS = [
            ['var(--green)', 'var(--accent)'],
            ['var(--purple)', 'var(--pink)'],
            ['var(--orange)', 'var(--red)'],
            ['var(--cyan)', 'var(--green)'],
            ['var(--accent)', 'var(--purple)'],
        ];

        async function fetchJSON(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`GitHub API ${res.status}: ${res.statusText}`);
            return res.json();
        }

        async function fetchAllRepos() {
            let page = 1;
            let all = [];
            while (true) {
                const repos = await fetchJSON(`${API}/users/${USERNAME}/repos?per_page=100&sort=updated&page=${page}`);
                all = all.concat(repos);
                if (repos.length < 100) break;
                page++;
            }
            return all;
        }

        function timeAgo(dateStr) {
            const diff = Date.now() - new Date(dateStr).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 60) return `${mins}m ago`;
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return `${hrs}h ago`;
            const days = Math.floor(hrs / 24);
            if (days < 30) return `${days}d ago`;
            const months = Math.floor(days / 30);
            if (months < 12) return `${months}mo ago`;
            return `${Math.floor(months / 12)}y ago`;
        }

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('en-US', {
                year: 'numeric', month: 'short', day: 'numeric'
            });
        }

        function shortDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function yearsSince(dateStr) {
            return Math.floor((Date.now() - new Date(dateStr).getTime()) / (365.25 * 24 * 60 * 60 * 1000));
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function langColor(lang) {
            return LANG_COLORS[lang] || '#555';
        }

        function eventIcon(type) {
            const map = {
                PushEvent: ['push', 'P'],
                PullRequestEvent: ['pr', 'PR'],
                CreateEvent: ['create', '+'],
                DeleteEvent: ['delete', '-'],
                IssueCommentEvent: ['issue', 'C'],
                IssuesEvent: ['issue', 'I'],
                PullRequestReviewEvent: ['review', 'R'],
                PullRequestReviewCommentEvent: ['review', 'R'],
                WatchEvent: ['other', '*'],
                ForkEvent: ['other', 'F'],
                ReleaseEvent: ['create', 'R'],
            };
            return map[type] || ['other', '?'];
        }

        function eventDescription(evt) {
            const repo = `<span class="timeline-repo">${escapeHtml(evt.repo.name)}</span>`;
            switch (evt.type) {
                case 'PushEvent': {
                    const ref = evt.payload.ref?.replace('refs/heads/', '') || '';
                    const count = evt.payload.commits?.length || 0;
                    return `Pushed ${count} commit${count !== 1 ? 's' : ''} to ${repo}<br><code style="font-size:0.75rem;color:var(--green);">${escapeHtml(ref)}</code>`;
                }
                case 'PullRequestEvent': {
                    const action = evt.payload.action === 'closed' && evt.payload.pull_request?.merged ? 'Merged' : evt.payload.action.charAt(0).toUpperCase() + evt.payload.action.slice(1);
                    const title = evt.payload.pull_request?.title || '';
                    return `${action} PR on ${repo}${title ? `<br><span style="color:var(--text-muted);font-size:0.8rem;">${escapeHtml(title)}</span>` : ''}`;
                }
                case 'CreateEvent':
                    return `Created ${evt.payload.ref_type} <code style="font-size:0.75rem;color:var(--accent);">${escapeHtml(evt.payload.ref || '')}</code> on ${repo}`;
                case 'DeleteEvent':
                    return `Deleted ${evt.payload.ref_type} <code style="font-size:0.75rem;color:var(--red);">${escapeHtml(evt.payload.ref || '')}</code> on ${repo}`;
                case 'IssueCommentEvent':
                    return `Commented on issue in ${repo}`;
                case 'IssuesEvent':
                    return `${evt.payload.action} issue in ${repo}`;
                case 'PullRequestReviewEvent':
                case 'PullRequestReviewCommentEvent':
                    return `Reviewed PR in ${repo}`;
                case 'WatchEvent':
                    return `Starred ${repo}`;
                case 'ForkEvent':
                    return `Forked ${repo}`;
                case 'ReleaseEvent':
                    return `Released ${escapeHtml(evt.payload.release?.tag_name || '')} on ${repo}`;
                default:
                    return `${evt.type.replace('Event', '')} on ${repo}`;
            }
        }

        function freshnessLabel(dateStr, archived) {
            if (archived) return '<span style="color:var(--red);">Archived</span>';
            const days = Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
            if (days < 7) return '<span style="color:var(--green);">This week</span>';
            if (days < 30) return '<span style="color:var(--green);">This month</span>';
            if (days < 90) return '<span style="color:var(--accent);">Recent</span>';
            if (days < 365) return '<span style="color:var(--text-muted);">This year</span>';
            return '<span style="color:var(--text-muted);">Older</span>';
        }

        async function buildDashboard() {
            const app = document.getElementById('app');

            try {
                // Fetch all data in parallel
                const [user, allRepos, events, starred, gists] = await Promise.all([
                    fetchJSON(`${API}/users/${USERNAME}`),
                    fetchAllRepos(),
                    fetchJSON(`${API}/users/${USERNAME}/events?per_page=100`),
                    fetchJSON(`${API}/users/${USERNAME}/starred?per_page=100`),
                    fetchJSON(`${API}/users/${USERNAME}/gists?per_page=100`),
                ]);

                const originalRepos = allRepos.filter(r => !r.fork);
                const totalStars = originalRepos.reduce((s, r) => s + r.stargazers_count, 0);

                // Language aggregation
                const langMap = {};
                originalRepos.forEach(r => {
                    const lang = r.language || 'Other';
                    if (!langMap[lang]) langMap[lang] = { count: 0, stars: 0 };
                    langMap[lang].count++;
                    langMap[lang].stars += r.stargazers_count;
                });
                const languages = Object.entries(langMap)
                    .map(([lang, d]) => ({ lang, ...d }))
                    .sort((a, b) => b.count - a.count);
                const totalLangRepos = languages.reduce((s, l) => s + l.count, 0);
                const uniqueLangs = languages.filter(l => l.lang !== 'Other').length;

                // Event aggregation by repo
                const eventsByRepo = {};
                events.forEach(e => {
                    const repo = e.repo.name;
                    if (!eventsByRepo[repo]) eventsByRepo[repo] = 0;
                    eventsByRepo[repo]++;
                });
                const topRepoActivity = Object.entries(eventsByRepo)
                    .map(([repo, count]) => ({ repo, count }))
                    .sort((a, b) => b.count - a.count);
                const maxEvents = topRepoActivity[0]?.count || 1;

                // Top repos by stars
                const topStarred = [...originalRepos].sort((a, b) => b.stargazers_count - a.stargazers_count).slice(0, 10);

                // Active repos (pushed recently, non-fork, non-archived)
                const now = Date.now();
                const oneYearAgo = new Date(now - 365 * 86400000).toISOString();
                const activeRepos = originalRepos
                    .filter(r => !r.archived && r.pushed_at > oneYearAgo)
                    .sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at));

                // Repos sorted by push for table
                const allOriginalSorted = [...originalRepos].sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at));

                // Repo creation by year
                const creationYears = {};
                allRepos.forEach(r => {
                    const year = new Date(r.created_at).getFullYear();
                    creationYears[year] = (creationYears[year] || 0) + 1;
                });

                // Most active repo right now
                const latestEvent = events[0];
                const currentBranch = events.find(e => e.type === 'PushEvent')?.payload?.ref?.replace('refs/heads/', '');

                // Detect themes from repo names/descriptions
                const repoText = originalRepos.map(r => `${r.name} ${r.description || ''}`).join(' ').toLowerCase();

                // Account age
                const accountYears = yearsSince(user.created_at);
                const memberSince = new Date(user.created_at).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });

                // Was active today?
                const todayStr = new Date().toISOString().slice(0, 10);
                const activeToday = events.some(e => e.created_at?.startsWith(todayStr));

                // Build HTML
                let html = '';

                // ── Profile Header ──
                html += `
                <div class="profile-header">
                    <img class="avatar" src="${escapeHtml(user.avatar_url)}" alt="${escapeHtml(user.name || user.login)}">
                    <div class="profile-info">
                        <h1>${escapeHtml(user.name || user.login)} <span>@${escapeHtml(user.login)}</span></h1>
                        <div style="margin-top:0.35rem;">
                            ${user.hireable ? '<span class="badge hireable">Available for hire</span>' : ''}
                            <span class="badge">Member since ${memberSince}</span>
                        </div>
                        ${user.bio ? `<p style="color:var(--text-muted);margin-top:0.35rem;">${escapeHtml(user.bio)}</p>` : ''}
                        <div class="profile-meta">
                            <span><a href="${escapeHtml(user.html_url)}" target="_blank">github.com/${escapeHtml(user.login)}</a></span>
                            ${user.blog ? `<span><a href="${escapeHtml(user.blog.startsWith('http') ? user.blog : 'https://' + user.blog)}" target="_blank">${escapeHtml(user.blog.replace(/^https?:\/\//, ''))}</a></span>` : ''}
                            ${user.email ? `<span style="color:var(--text-muted);">${escapeHtml(user.email)}</span>` : ''}
                        </div>
                        <div class="account-age">${accountYears}+ years on GitHub &middot; ${activeToday ? 'Active today' : `Last seen ${timeAgo(user.updated_at)}`}</div>
                    </div>
                </div>`;

                // ── Stats Row ──
                html += `
                <div class="stats-row">
                    <div class="stat-card accent"><div class="number">${user.public_repos}</div><div class="label">Public Repos</div></div>
                    <div class="stat-card green"><div class="number">${user.followers}</div><div class="label">Followers</div></div>
                    <div class="stat-card purple"><div class="number">${user.following}</div><div class="label">Following</div></div>
                    <div class="stat-card orange"><div class="number">${totalStars}</div><div class="label">Total Stars Earned</div></div>
                    <div class="stat-card pink"><div class="number">${user.public_gists}</div><div class="label">Public Gists</div></div>
                    <div class="stat-card cyan"><div class="number">${uniqueLangs}</div><div class="label">Languages Used</div></div>
                </div>`;

                // ── Current Focus ──
                html += `
                <div class="card full-width">
                    <h2><span class="pulse"></span> Current Focus &amp; Active Work</h2>
                    <p style="color:var(--text-muted);margin-bottom:0.75rem;">Based on recent public events:</p>
                    <div>${topRepoActivity.slice(0, 5).map((r, i) => {
                        const cls = i === 0 ? 'hot' : i < 3 ? 'warm' : '';
                        return `<span class="focus-tag ${cls}">${escapeHtml(r.repo)} (${r.count} events)</span>`;
                    }).join('')}</div>
                    ${latestEvent ? `<p style="color:var(--text-muted);margin-top:1rem;font-size:0.9rem;">
                        <strong style="color:var(--text);">Latest:</strong> ${eventDescription(latestEvent)}
                        &mdash; <span style="color:var(--text-muted);">${timeAgo(latestEvent.created_at)}</span>
                    </p>` : ''}
                </div>`;

                // ── Languages + Top Repos ──
                html += '<div class="grid-2">';

                // Language breakdown
                html += `<div class="card">
                    <h2>Language Breakdown</h2>
                    <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:0.75rem;">Across ${originalRepos.length} original (non-fork) repos</p>
                    <div class="lang-bar">
                        ${languages.map(l => `<div style="width:${(l.count / totalLangRepos * 100).toFixed(1)}%;background:${langColor(l.lang)};" title="${escapeHtml(l.lang)} ${l.count}"></div>`).join('')}
                    </div>
                    <div class="lang-legend">
                        ${languages.map(l => `<div class="lang-legend-item"><div class="lang-dot" style="background:${langColor(l.lang)};"></div> ${escapeHtml(l.lang)} <span class="lang-count">${l.count} repos (${l.stars}&#9733;)</span></div>`).join('')}
                    </div>
                </div>`;

                // Top repos by stars
                html += `<div class="card">
                    <h2>Top Repos by Stars</h2>
                    <div class="scroll-inner">
                        ${topStarred.filter(r => r.stargazers_count > 0).map(r => `
                        <div class="repo-item">
                            <a class="repo-name" href="${escapeHtml(r.html_url)}" target="_blank">${escapeHtml(r.name)}</a>
                            ${r.description ? `<div class="repo-desc">${escapeHtml(r.description)}</div>` : ''}
                            <div class="repo-meta">
                                <span class="star">&#9733; ${r.stargazers_count}</span>
                                ${r.language ? `<span><span class="repo-lang" style="background:${langColor(r.language)};"></span>${escapeHtml(r.language)}</span>` : ''}
                                ${r.forks_count > 0 ? `<span>${r.forks_count} forks</span>` : ''}
                                ${r.archived ? '<span class="badge" style="font-size:0.7rem;">archived</span>' : ''}
                                ${r.homepage ? `<span><a href="${escapeHtml(r.homepage)}" target="_blank" style="color:var(--accent);">${escapeHtml(r.homepage.replace(/^https?:\/\//, ''))}</a></span>` : ''}
                            </div>
                        </div>`).join('')}
                    </div>
                </div>`;

                html += '</div>'; // grid-2

                // ── Activity heatmap + Timeline ──
                html += '<div class="grid-2">';

                // Activity by repo
                html += `<div class="card">
                    <h2>Recent Activity by Repo</h2>
                    <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:1rem;">From recent public events</p>
                    <div class="activity-grid">
                        ${topRepoActivity.map((r, i) => {
                            const [c1, c2] = BAR_GRADIENTS[i % BAR_GRADIENTS.length];
                            return `<div class="activity-repo">
                                <div class="activity-repo-name">${escapeHtml(r.repo.split('/').pop())}</div>
                                <div class="activity-bar-container">
                                    <div class="activity-bar" style="width:${(r.count / maxEvents * 100).toFixed(1)}%;background:linear-gradient(90deg,${c1},${c2});">${r.count}</div>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;

                // Timeline
                html += `<div class="card">
                    <h2>Recent Activity Timeline</h2>
                    <div class="scroll-inner" style="max-height:420px;">
                        ${events.slice(0, 30).map(evt => {
                            const [iconClass, iconLabel] = eventIcon(evt.type);
                            return `<div class="timeline-item">
                                <div class="timeline-icon ${iconClass}">${iconLabel}</div>
                                <div class="timeline-content">
                                    ${eventDescription(evt)}
                                    <div class="timeline-time">${formatDate(evt.created_at)} &middot; ${timeAgo(evt.created_at)}</div>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;

                html += '</div>'; // grid-2

                // ── Active Projects + Starred ──
                html += '<div class="grid-2">';

                // Active projects
                html += `<div class="card">
                    <h2>Active Projects (past year)</h2>
                    <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:0.75rem;">Non-fork, non-archived repos with recent pushes</p>
                    <div class="scroll-inner">
                        ${activeRepos.map(r => `
                        <div class="repo-item">
                            <a class="repo-name" href="${escapeHtml(r.html_url)}" target="_blank">${escapeHtml(r.name)}</a>
                            ${r.description ? `<div class="repo-desc">${escapeHtml(r.description)}</div>` : ''}
                            <div class="repo-meta">
                                ${r.stargazers_count > 0 ? `<span class="star">&#9733; ${r.stargazers_count}</span>` : ''}
                                ${r.language ? `<span><span class="repo-lang" style="background:${langColor(r.language)};"></span>${escapeHtml(r.language)}</span>` : ''}
                                <span>Pushed ${shortDate(r.pushed_at)}</span>
                            </div>
                        </div>`).join('')}
                    </div>
                </div>`;

                // Starred repos
                html += `<div class="card">
                    <h2>Recently Starred (Interests)</h2>
                    <div class="scroll-inner">
                        ${starred.slice(0, 20).map(r => `
                        <div class="starred-item">
                            <a class="starred-name" href="${escapeHtml(r.html_url)}" target="_blank">${escapeHtml(r.full_name)}</a>
                            <span style="color:var(--orange);font-size:0.8rem;">&#9733; ${r.stargazers_count.toLocaleString()}</span>
                            ${r.language ? `<span style="font-size:0.8rem;color:var(--text-muted);"> &middot; ${escapeHtml(r.language)}</span>` : ''}
                            ${r.description ? `<div class="starred-desc">${escapeHtml(r.description)}</div>` : ''}
                        </div>`).join('')}
                    </div>
                </div>`;

                html += '</div>'; // grid-2

                // ── Gists + Year Chart ──
                html += '<div class="grid-2">';

                // Gists
                html += `<div class="card">
                    <h2>Gists</h2>
                    <div class="scroll-inner">
                        ${gists.map(g => {
                            const files = Object.keys(g.files);
                            const desc = g.description || files[0] || 'Untitled';
                            return `<div class="gist-item">
                                <a class="gist-name" href="${escapeHtml(g.html_url)}" target="_blank">${escapeHtml(desc)}</a>
                                <div class="gist-files">${escapeHtml(files.join(', '))} &middot; ${formatDate(g.created_at)}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;

                // Year chart
                const years = Object.entries(creationYears).sort((a, b) => a[0] - b[0]);
                const maxYearRepos = Math.max(...years.map(y => y[1]));
                const currentYear = new Date().getFullYear();

                html += `<div class="card">
                    <h2>Repo Creation by Year</h2>
                    <div class="year-chart">
                        ${years.map(([year, count]) => {
                            const pct = (count / maxYearRepos * 100).toFixed(1);
                            const color = parseInt(year) >= currentYear ? 'var(--green)' : parseInt(year) >= currentYear - 2 ? 'var(--accent)' : 'var(--purple)';
                            return `<div class="year-bar" style="height:${pct}%;background:${color};" data-tooltip="${year}: ${count} repos"></div>`;
                        }).join('')}
                    </div>
                    <div class="year-labels">
                        ${years.filter((_, i) => i % Math.max(1, Math.floor(years.length / 6)) === 0 || _ === years[years.length - 1]).map(([y]) => `<span>${y}</span>`).join('')}
                    </div>
                </div>`;

                html += '</div>'; // grid-2

                // ── Full Repo Table ──
                html += `
                <div class="card full-width" style="margin-top:1.5rem;">
                    <h2>All Original Repositories (non-fork)</h2>
                    <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:1rem;">Sorted by most recently pushed &middot; ${originalRepos.length} repos</p>
                    <div class="scroll-inner" style="max-height:600px;">
                        <table>
                            <thead>
                                <tr><th>Repo</th><th>Language</th><th style="text-align:center;">Stars</th><th>Last Push</th><th>Status</th></tr>
                            </thead>
                            <tbody>
                                ${allOriginalSorted.map(r => `
                                <tr>
                                    <td>
                                        <a href="${escapeHtml(r.html_url)}" target="_blank" style="color:var(--accent);text-decoration:none;font-weight:600;">${escapeHtml(r.name)}</a>
                                        ${r.description ? `<div style="color:var(--text-muted);font-size:0.75rem;">${escapeHtml(r.description)}</div>` : ''}
                                    </td>
                                    <td>${r.language ? `<span class="repo-lang" style="background:${langColor(r.language)};"></span>${escapeHtml(r.language)}` : '-'}</td>
                                    <td style="text-align:center;color:${r.stargazers_count > 0 ? 'var(--orange)' : 'var(--text-muted)'};">${r.stargazers_count > 0 ? '&#9733; ' + r.stargazers_count : '-'}</td>
                                    <td style="color:var(--text-muted);">${r.pushed_at.slice(0, 10)}</td>
                                    <td>${freshnessLabel(r.pushed_at, r.archived)}</td>
                                </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;

                // ── Footer ──
                html += `
                <div class="updated">
                    Dashboard loaded ${new Date().toLocaleString()} &middot; Live data from GitHub API &middot;
                    <a href="${escapeHtml(user.html_url)}" target="_blank" style="color:var(--accent);">View on GitHub</a>
                </div>`;

                app.innerHTML = html;

            } catch (err) {
                app.innerHTML = `
                    <div class="error-msg">
                        Failed to load dashboard: ${escapeHtml(err.message)}<br>
                        <small>GitHub API may be rate-limited (60 req/hr for unauthenticated). Try again later.</small>
                    </div>`;
                console.error(err);
            }
        }

        buildDashboard();
    </script>
</body>
</html>
