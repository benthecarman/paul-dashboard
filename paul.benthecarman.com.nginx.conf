server {
    listen 80;
    listen [::]:80;
    server_name paul.benthecarman.com;

    root /var/www/paul-dashboard;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
